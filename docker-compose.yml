services:
  db:
    image: postgis/postgis:16-3.4
    container_name: guyacanes_db
    environment:
      POSTGRES_DB: guyacanes_dev
      POSTGRES_USER: guyacanes
      POSTGRES_PASSWORD: guyacanes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guyacanes -d guyacanes_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: guyacanes_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:

networks:
  default:
    name: guyacanes_network
